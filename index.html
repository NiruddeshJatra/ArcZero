<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ArcZero</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background: #0a0a0f;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        font-family: 'Courier New', monospace;
        color: #ffffff;
        overflow: hidden;
      }

      #game-wrapper {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
      }

      #game-canvas {
        display: block;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 2px;
        max-width: 100vw;
        max-height: 80vh;
      }

      #hud {
        display: flex;
        gap: 24px;
        font-size: 14px;
        letter-spacing: 0.05em;
        color: rgba(255, 255, 255, 0.5);
        padding: 6px 16px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 4px;
        width: 100%;
        justify-content: space-between;
      }

      .hud-item span {
        color: #ffffff;
        font-size: 15px;
      }

      #game-over-overlay {
        display: none;
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(10, 10, 15, 0.88);
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        border-radius: 2px;
      }

      #game-over-overlay.visible {
        display: flex;
      }

      #game-over-title {
        font-size: 52px;
        font-weight: 700;
        color: #ff3535;
        letter-spacing: 0.08em;
      }

      #final-score {
        font-size: 22px;
        color: rgba(255, 255, 255, 0.65);
      }

      #restart-btn {
        margin-top: 8px;
        padding: 12px 36px;
        background: #ff4444;
        border: none;
        border-radius: 4px;
        color: #fff;
        font-family: 'Courier New', monospace;
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 0.1em;
        cursor: pointer;
        transition: opacity 0.15s;
      }

      #restart-btn:hover { opacity: 0.8; }

      #controls-hint {
        font-size: 11px;
        color: rgba(255, 255, 255, 0.25);
        letter-spacing: 0.05em;
        margin-top: 4px;
      }

      #level-intro-overlay {
        display: none;
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(10, 10, 15, 0.88);
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        border-radius: 2px;
      }

      #level-intro-overlay.visible {
        display: flex;
      }

      #level-intro-title {
        font-size: 52px;
        font-weight: 700;
        color: #44aaff;
        letter-spacing: 0.08em;
      }

      #level-intro-countdown {
        font-size: 80px;
        font-weight: 700;
        color: rgba(255, 255, 255, 0.75);
        min-width: 1ch;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div id="game-wrapper">
      <canvas id="game-canvas" width="1000" height="750"></canvas>
      <div id="hud">
        <div class="hud-item">LEVEL <span id="hud-level">1</span></div>
        <div class="hud-item">SCORE <span id="hud-score">0</span></div>
        <div class="hud-item">HEALTH <span id="hud-health">100</span></div>
        <div class="hud-item">ANGLE <span id="hud-angle">45°</span></div>
        <div class="hud-item">POWER <span id="hud-power">20</span></div>
      </div>
      <div id="game-over-overlay">
        <div id="game-over-title">GAME OVER</div>
        <div id="final-score">SCORE: <span id="final-score-value">0</span></div>
        <button id="restart-btn">PLAY AGAIN</button>
        <div id="controls-hint">← → MOVE &nbsp; ↑ ↓ AIM &nbsp; SPACE FIRE &nbsp; Z FLIP</div>
      </div>
      <div id="level-intro-overlay">
        <div id="level-intro-title">LEVEL 1</div>
        <div id="level-intro-text" style="font-size:16px;color:rgba(255,255,255,0.55);letter-spacing:0.06em;margin-top:-8px;"></div>
        <div id="level-intro-countdown">3</div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
